# PromptSensitivityFI — versioned config. See Research_Design_v3 §7 / §9.
# Bump `config_version` whenever a value changes; experiments are keyed on it.
config_version: 2
random_seed: 42

# §2.4 — sample sizes per dataset.
sampling:
  hotpotqa:
    n_questions: 100
    stratify_by: level          # {medium, hard}
    split: validation
    hf_dataset: "hotpotqa/hotpot_qa"
    hf_config: "distractor"
  twiki:
    n_questions: 50
    stratify_by: type           # {comparison, inference, compositional, bridge_comparison}
    split: validation
    hf_dataset: "framolfese/2WikiMultihopQA"
    hf_config: null

# §4 — three-ladder construction.
ladders:
  levels: [0, 2, 4, 6, 8, 10]    # number of paragraphs in prompt at each level
  k_gold: 2                       # all questions in HotpotQA / 2WikiMultihopQA have 2 gold paragraphs
  n_total_paragraphs: 10
  variants: [random, gold_first, distractor_first]

# §3.1 — paraphrase universe per question.
paraphrases:
  n_per_question: 30
  generator_model: gpt_4o           # key into `models` below; substituted to kit.gpt-4.1
  generator_temperature: 0.8
  templates: [neutral, journalist, casual_user, domain_expert]
  raw_candidates_per_question: 40
  samples_per_template: 10          # 4 templates × 10 = 40 raw candidates
  max_regeneration_attempts: 50
  nli:
    model: "MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli"
    bidirectional_threshold: 0.9
    fallback_threshold: 0.85
  constraint_filter:
    judge_model: gpt_4o             # key into `models` below; substituted to kit.gpt-4.1
    jaccard_threshold: 0.9
    # Was 256, but the smoke run caught the judge returning truncated JSON
    # (e.g. `{"answers": ["private equity", "private`) which fell back to []
    # and forced Jaccard=0 -> false rejection. 1024 leaves headroom for long
    # answer-variant lists.
    judge_max_tokens: 1024
  deduplication:
    # Distance metric for dedup. See `paraphrases/deduplicate.py` docstring.
    #   "char"  — character-level Levenshtein (brief's default; min=6 means
    #              the brief's "edit distance > 5"). Recommended for long
    #              questions (>100 chars).
    #   "token" — whitespace-tokenised word-level. Recommended min=3 (>=3
    #              word swaps). Switch to this if a sizable fraction of the
    #              sample has short questions (~80 chars / ~12 tokens) where
    #              char-level over-rejects: the 2026-05-21 smoke showed
    #              q2/q3 (port-city / Wilmslow-school questions) drop 350+
    #              candidates per attempt under char mode.
    metric: char
    min_edit_distance: 6

# §5 — models reached through the KIT/DSI LiteLLM gateway.
#
# IMPORTANT — model substitutions vs. design doc (logged 2026-05-12 after
# `make list-models` confirmed the gateway's catalogue is 20 specific models
# and DOES NOT include Mistral-7B, Qwen2.5-7B, or GPT-4o):
#
#   Design doc                    Gateway substitute                    Notes
#   -----------------------------  -----------------------------------  ----------------------------
#   Llama-3.1-8B-Instruct           meta-llama-3.1-8b-instruct           exact match
#   Mistral-7B-Instruct-v0.3        teuken-7b-instruct-research          OpenGPT-X 7B; only ~7B instruct
#                                                                        non-Llama instruct available
#   Qwen2.5-7B-Instruct             qwen3-30b-a3b-instruct-2507          MoE ~3B active per token;
#                                                                        nearest "7B-class" Qwen on gw
#   GPT-4o                          kit.gpt-4.1                          closest non-reasoning OpenAI
#                                                                        flagship; gpt-5/5.1 skipped
#                                                                        (anti-pattern: no reasoning
#                                                                        models in primary run)
#
# Capability flags reflect what the gateway exposes per model. Per §5.3 of
# Research_Design_v3 + the 2026-05-12 supervisor exchange:
#   - chat_logprobs:    /v1/chat/completions supports `logprobs=true, top_logprobs<=20`
#   - echo_completions: /v1/completions supports `echo=true, logprobs=N, max_tokens=0`
#                       (the only path to POSIX's forced sequence scoring pre-cluster).
#   - has_hidden:       false everywhere via the gateway. Cluster-only.
#
# The chat_logprobs / echo_completions flags are optimistic defaults; `make
# api-check` confirms per-model. If api-check reports lp=no for a model, flip
# its chat_logprobs to false and downstream code (Errica / POSIX) will fall
# back to Monte-Carlo over semantic clusters.
models:
  llama_3_1_8b:
    provider: litellm
    model_id: "meta-llama-3.1-8b-instruct"
    chat_logprobs: true
    echo_completions: true
    has_hidden: false
  mistral_7b_v03:
    # SUBSTITUTE: Mistral-7B not on gateway. Teuken-7B (OpenGPT-X) is the
    # only ~7B-class non-Llama instruct model offered. Different tokeniser
    # and architecture (Llama-arch w/ German-heavy training), so it still
    # serves the "architecture contrast" intent of §5.1.
    provider: litellm
    model_id: "teuken-7b-instruct-research"
    chat_logprobs: true
    echo_completions: true
    has_hidden: false
  qwen_2_5_7b:
    # SUBSTITUTE: Qwen2.5-7B not on gateway. qwen3-30b-a3b-instruct-2507 is
    # a MoE with ~3B active params per token (despite the 30B name) so
    # inference compute is comparable to a dense 7B model. Newer Qwen
    # generation (3 -> 2.5) — flag this in the writeup.
    provider: litellm
    model_id: "qwen3-30b-a3b-instruct-2507"
    chat_logprobs: true
    echo_completions: true
    has_hidden: false
  gpt_4o:
    # SUBSTITUTE: GPT-4o not on gateway. kit.gpt-4.1 is the closest non-
    # reasoning OpenAI flagship. The kit.gpt-5* family is explicitly skipped
    # per the design-doc anti-pattern "No reasoning models in the primary run".
    provider: litellm
    model_id: "kit.gpt-4.1"
    chat_logprobs: true           # OpenAI gives top_logprobs<=20 on chat-completions
    echo_completions: false       # OpenAI removed echo from modern chat models -> POSIX null
    has_hidden: false

# §6 — F(x) scoring.
scoring:
  method: "nli_with_gold"           # NEVER exact_match (Hua 2025 EMNLP arXiv:2509.01790)
  nli_model: "MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli"
  entail_threshold: 0.7
  contradict_threshold: 0.5
  exact_match_appendix_only: true

# §3 — H_sem clustering (Farquhar 2024 Nature).
h_sem:
  n_samples_per_prompt: 10
  sampling_temperature: 1.0
  cluster_nli_model: "MoritzLaurer/DeBERTa-v3-large-mnli-fever-anli-ling-wanli"
  cluster_threshold: 0.5

# §7.6.3 — bootstrap CIs.
bootstrap:
  n_iterations: 1000
  confidence: 0.95

# Embedding encoders.
embedding:
  external_encoder: "sentence-transformers/all-mpnet-base-v2"
  # Gateway-routed OpenAI embedding; useful for closed-model proxy embeddings.
  gateway_encoder: "text-embedding-3-large"

# API access — single LiteLLM gateway.
api:
  base_url_env: "LITELLM_BASE_URL"
  api_key_env: "LITELLM_API_KEY"
  default_base_url: "https://ai-gateway.dsi-experimente.de/v1"
  max_retries: 6
  initial_backoff_s: 1.0
  max_backoff_s: 60.0
  rate_limit_qps:
    litellm: 10.0                  # conservative until we benchmark; gateway-side limit unknown

# Cache — hash-based; never re-call same (prompt, model, sampling-params).
cache:
  backend: sqlite
  path: "data/cache/llm_cache.sqlite"

# Spend guard. The gateway tracks per-key spend server-side; this is a local
# soft cap surfaced in scripts so we abort if the supervisor's budget is at risk.
spend:
  pilot_usd_cap: 150.0
